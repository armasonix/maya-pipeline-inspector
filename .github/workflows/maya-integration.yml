# Optional Maya integration tests for maintainers.
#
# This workflow is NOT part of the default public CI gate (see ci.yml).
# Trigger manually from GitHub Actions when a self-hosted runner with Maya is
# available, or rely on the graceful skip when MAYA_PY is unset.
#
# Setup:
#   1. Configure a self-hosted runner with Autodesk Maya installed.
#   2. Add repository secret MAYA_PY with the absolute path to mayapy, e.g.
#      /usr/autodesk/maya2025/bin/mayapy
#      or C:\Program Files\Autodesk\Maya2025\bin\mayapy.exe
#   3. Actions -> Maya integration -> Run workflow
#      Optional workflow input `mayapy_path` overrides the secret for one run.
#
# Local equivalent:
#   mayapy -m pip install -e ".[dev]"
#   mayapy -m pytest tests/integration -v
#   mayapy -m shader_health manifest examples/broken_scene/shader_health_demo_broken.ma \
#     --out /tmp/shader_health_manifest_smoke.json --profile-id publish_strict
#   mayapy -m shader_health gate examples/broken_scene/shader_health_demo_broken.ma \
#     /tmp/shader_health_manifest_smoke.json --profile-id publish_strict --out /tmp/gate.json
#
# See docs/MAYA_INSTALL.md for full install and CI notes.

name: Maya integration

on:
  workflow_dispatch:
    inputs:
      mayapy_path:
        description: Optional absolute path to mayapy (overrides MAYA_PY secret)
        required: false
        default: ""

permissions:
  contents: read

jobs:
  maya-integration:
    name: Integration tests via mayapy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve mayapy path
        id: mayapy
        env:
          MAYA_PY_SECRET: ${{ secrets.MAYA_PY }}
        run: |
          candidate="${{ inputs.mayapy_path }}"
          if [ -z "$candidate" ]; then
            candidate="$MAYA_PY_SECRET"
          fi

          if [ -z "$candidate" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Maya integration skipped: set MAYA_PY repository secret or workflow input mayapy_path."
            exit 0
          fi

          if [ ! -x "$candidate" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Maya integration skipped: mayapy not found or not executable at: $candidate"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "path=$candidate" >> "$GITHUB_OUTPUT"
          echo "Using mayapy: $candidate"

      - name: Install package into Maya Python
        if: steps.mayapy.outputs.skip != 'true'
        run: |
          "${{ steps.mayapy.outputs.path }}" -m pip install --upgrade pip
          "${{ steps.mayapy.outputs.path }}" -m pip install -e ".[dev]"

      - name: Run integration tests with mayapy
        if: steps.mayapy.outputs.skip != 'true'
        run: |
          "${{ steps.mayapy.outputs.path }}" -m pytest tests/integration -v

      - name: Manifest export smoke
        if: steps.mayapy.outputs.skip != 'true'
        run: |
          DEMO_SCENE="examples/broken_scene/shader_health_demo_broken.ma"
          OUT_MANIFEST="${RUNNER_TEMP}/shader_health_manifest_smoke.json"
          "${{ steps.mayapy.outputs.path }}" -m shader_health manifest \
            "$DEMO_SCENE" \
            --out "$OUT_MANIFEST" \
            --profile-id publish_strict
          test -s "$OUT_MANIFEST"
          python3 -c "import json, pathlib; payload=json.loads(pathlib.Path('${OUT_MANIFEST}').read_text(encoding='utf-8')); assert payload.get('manifest_schema_version') == '1.1'"

      - name: Manifest gate smoke
        if: steps.mayapy.outputs.skip != 'true'
        run: |
          DEMO_SCENE="examples/broken_scene/shader_health_demo_broken.ma"
          BASELINE="${RUNNER_TEMP}/shader_health_manifest_smoke.json"
          GATE_REPORT="${RUNNER_TEMP}/shader_health_gate_smoke.json"
          "${{ steps.mayapy.outputs.path }}" -m shader_health gate \
            "$DEMO_SCENE" \
            "$BASELINE" \
            --profile-id publish_strict \
            --out "$GATE_REPORT"
          test -s "$GATE_REPORT"
          python3 -c "import json, pathlib, sys; payload=json.loads(pathlib.Path('${GATE_REPORT}').read_text(encoding='utf-8')); sys.exit(1 if payload.get('manifest_regression_blocked') else 0)"

      - name: Report graceful skip
        if: steps.mayapy.outputs.skip == 'true'
        run: |
          echo "::notice title=Maya integration skipped::No usable mayapy path. Default public CI in ci.yml remains Maya-free. Configure MAYA_PY on a self-hosted runner with Maya, then re-run this workflow."
