# Maya integration tests on a self-hosted runner with Autodesk Maya installed.
#
# NOT part of the default public CI gate (see ci.yml). Requires runner labels:
#   self-hosted, maya
#
# Windows self-hosted runners: uses Windows PowerShell (`powershell`) — not Git Bash or pwsh.
#
# Setup (maintainers):
#   1. Register a self-hosted runner with labels `self-hosted` and `maya`.
#   2. Install Maya and set repository secret MAYA_PY to the absolute mayapy path, e.g.
#        C:\Program Files\Autodesk\Maya2025\bin\mayapy.exe
#        /usr/autodesk/maya2025/bin/mayapy
#      Optional: repository variable MAYA_PY, runner env MAYA_PY, or workflow input mayapy_path.
#   3. Actions -> Maya integration -> Run workflow (or wait for weekly schedule / same-repo PR).
#
# Fork pull requests are skipped (self-hosted runners must not execute untrusted fork code).
# When this job runs, a missing mayapy path fails the job — there is no silent success skip.
#
# Local equivalent: docs/MAYA_INSTALL.md and docs/CLI_TESTING.md

name: Maya integration

on:
  workflow_dispatch:
    inputs:
      mayapy_path:
        description: Optional absolute path to mayapy (overrides MAYA_PY secret)
        required: false
        default: ""
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    paths:
      - "src/shader_health/maya/**"
      - "maya_module/**"
      - "tests/integration/**"
      - "examples/deadline/**"
      - "examples/broken_scene/**"
      - ".github/workflows/maya-integration.yml"
      - "tools/ci/**"

permissions:
  contents: read

concurrency:
  group: maya-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: powershell

jobs:
  maya-integration:
    name: Integration tests via mayapy
    runs-on: [self-hosted, maya]
    timeout-minutes: 90
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    env:
      DEMO_SCENE: examples/broken_scene/shader_health_demo_broken_headless.ma
      DEADLINE_PROFILE: src/shader_health/rules/profiles/deadline_critical.json
      DEBUG_SESSION_LOG: ${{ github.workspace }}/debug-ee1eca.log
      DEBUG_RUN_ID: github-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Diagnose runner shell
        shell: powershell
        run: |
          Write-Host "PSVersion:" $PSVersionTable.PSVersion
          Write-Host "PSEdition:" $PSVersionTable.PSEdition
          Write-Host "OS:" $PSVersionTable.OS
          foreach ($cmd in @('python','pwsh','powershell','bash','mayapy')) {
            $found = Get-Command $cmd -ErrorAction SilentlyContinue
            if ($found) { Write-Host "FOUND $cmd -> $($found.Source)" } else { Write-Host "MISSING $cmd" }
          }

      - name: Resolve mayapy path
        id: mayapy
        shell: cmd
        env:
          MAYA_PY_SECRET: ${{ secrets.MAYA_PY }}
          MAYA_PY_VAR: ${{ vars.MAYA_PY }}
          MAYA_PY_INPUT: ${{ inputs.mayapy_path }}
          DEBUG_SESSION_LOG: ${{ github.workspace }}/debug-ee1eca.log
          DEBUG_RUN_ID: github-${{ github.run_id }}
        run: python tools\ci\resolve_mayapy.py

      - name: Verify demo scene exists
        run: |
          if (-not (Test-Path -LiteralPath $env:DEMO_SCENE)) {
            Write-Error "Missing demo scene: $env:DEMO_SCENE"
            exit 1
          }

      - name: Install package into Maya Python
        run: |
          $mayapy = '${{ steps.mayapy.outputs.path }}'
          & $mayapy -m pip install --upgrade pip
          & $mayapy -m pip install -e ".[dev]"

      - name: Run integration tests with mayapy
        run: |
          $mayapy = '${{ steps.mayapy.outputs.path }}'
          & $mayapy -m pytest tests/integration -v

      - name: Validate scene smoke (headless demo)
        env:
          REPORT: ${{ runner.temp }}/shader_health_validate_smoke.json
        run: |
          $mayapy = '${{ steps.mayapy.outputs.path }}'
          $report = $env:REPORT
          & $mayapy -m shader_health validate $env:DEMO_SCENE `
            --input-kind scene `
            --profile-id publish_strict `
            --report $report
          $code = $LASTEXITCODE
          if (-not (Test-Path -LiteralPath $report)) {
            Write-Error "Validate smoke did not write report: $report"
            exit 1
          }
          if ($code -gt 2) {
            Write-Error "Validate smoke failed with unexpected exit code $code (expected 0-2)"
            exit 1
          }
          python tools/ci/maya_integration_checks.py validate $report
          Write-Host "Validate smoke exit_code=$code"

      - name: Manifest export and gate smoke
        env:
          OUT_MANIFEST: ${{ runner.temp }}/shader_health_manifest_smoke.json
          GATE_REPORT: ${{ runner.temp }}/shader_health_gate_smoke.json
        run: |
          $mayapy = '${{ steps.mayapy.outputs.path }}'
          $manifest = $env:OUT_MANIFEST
          $gateReport = $env:GATE_REPORT
          & $mayapy tools/ci/maya_manifest_gate_smoke.py $env:DEMO_SCENE `
            --profile-id publish_strict `
            --manifest-out $manifest `
            --gate-out $gateReport
          if (-not (Test-Path -LiteralPath $manifest)) {
            Write-Error "Manifest smoke did not write file: $manifest"
            exit 1
          }
          if (-not (Test-Path -LiteralPath $gateReport)) {
            Write-Error "Gate smoke did not write report: $gateReport"
            exit 1
          }
          python tools/ci/maya_integration_checks.py manifest $manifest
          python tools/ci/maya_integration_checks.py gate $gateReport

      - name: Deadline preflight smoke
        env:
          PREFLIGHT_REPORT: ${{ runner.temp }}/shader_health_deadline_preflight_smoke.json
        run: |
          $mayapy = '${{ steps.mayapy.outputs.path }}'
          $report = $env:PREFLIGHT_REPORT
          & $mayapy examples/deadline/submit_preflight.py $env:DEMO_SCENE `
            --report $report `
            --profile $env:DEADLINE_PROFILE `
            --repo-root $env:GITHUB_WORKSPACE `
            --mayapy $mayapy
          $code = $LASTEXITCODE
          if (-not (Test-Path -LiteralPath $report)) {
            Write-Error "Deadline preflight smoke did not write report: $report"
            exit 1
          }
          if ($code -gt 2) {
            Write-Error "Deadline preflight smoke failed with unexpected exit code $code (expected 0-2)"
            exit 1
          }
          Write-Host "Deadline preflight smoke exit_code=$code (0=allow, 1=publish block, 2=deadline block)"
